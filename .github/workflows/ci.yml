name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Lint client
        run: cd client && npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret

      - name: Run client tests
        run: cd client && npm test

      - name: Run client tests with coverage
        run: cd client && npx vitest run --coverage
        continue-on-error: true

      - name: Build client
        run: npm run build

      - name: Verify server starts
        run: |
          cd server &
          sleep 2
          curl -f http://localhost:5000/api/health || exit 1
        env:
          NODE_ENV: production
          JWT_SECRET: ci-test-secret

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t schoolhub:${{ github.sha }} .

      - name: Verify Docker image
        run: |
          docker run -d --name test -p 5000:5000 -e JWT_SECRET=test-secret schoolhub:${{ github.sha }}
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "Server is healthy"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          curl -f http://localhost:5000/api/health || (echo "Server failed to start" && docker stop test && exit 1)
          docker stop test
